<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- disable zooming on mobile (pinch zoom + double tap) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Youtube Redesign - AmanCodex, Pratham</title>

    <!-- <link rel="icon" type="image/png" href="/assets/images/YouTube-Logo1.png" /> -->

    <link rel="shortcut icon" href="https://www.youtube.com/s/desktop/57c5d394/img/favicon.ico" type="image/x-icon">

    <link rel="icon" href="https://www.youtube.com/s/desktop/57c5d394/img/favicon_32x32.png" sizes="32x32">
    <link rel="icon" href="https://www.youtube.com/s/desktop/57c5d394/img/favicon_48x48.png" sizes="48x48">
    <link rel="icon" href="https://www.youtube.com/s/desktop/57c5d394/img/favicon_96x96.png" sizes="96x96">
    <link rel="icon" href="https://www.youtube.com/s/desktop/57c5d394/img/favicon_144x144.png" sizes="144x144">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Sora:wght@100..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet"/>

</head>

<body onload="window.scrollTo(0,0)">

    <div class="top-navBar">

        <!-- at the top bar of the page, we have a navbar which is divided into three sections - left, center and right. -->

        <!-- at the left, we have the logo of youtube -->

        <div class="navLeft">

            <button id="menuBtn"><i class="ri-menu-fill"></i></button>

            <img src="/assets/images/YouTube-Logo1.png" alt="logo-img" id="logo-img">

            <h2 id="logo-text">YouTube</h2>

        </div>

        <!-- at the center, we have the search bar and the category dropdown -->

       <div class="navCenter">

            <select class="category">

                <option value="all" class="category-option"> All </option>
                <option value="movie" class="category-option"> Movies </option>
                <option value="music" class="category-option"> Music </option>
                <option value="gaming" class="category-option"> Gaming </option>

            </select>

            <div class="search-container" id="searchContainer">

                <input type="text" id="searchBar" placeholder="Search">

                <button id="micBtn"><i class="ri-mic-line"></i></button> <!-- mic permission is given :) -->

                <button id="closeSearch"><i class="ri-close-line"></i></button>

            </div>

                

        </div>

        <!-- at the right, we have the profile picture and the dropdown for profile options -->

        <div class="navRight">

            <!-- Mobile search icon -->
                 
            <button id="searchBtn"><i class="ri-search-line"></i></button>

            <img src="/assets/images/Codex PFP.png" class="profile" id="profile-img">

            <div class="profile-menu" id="profile-menu">

                <div class="menu-item">👤 My Profile</div>
                <div class="menu-item">⚙️ Settings</div>
                <div class="menu-item">🚪 Sign Out</div>
                <div class="menu-item" id="themeToggle">🌙 Dark Mode</div>

            </div>

        </div>

    </div>

    <div class="vertical-left-navBar">

        <div class="vertical-nav-links">

            <!-- Navigation links for vertical navbar -->
            <section>
                <ul class="navs">
                    <li class="nav"><a href="#home"><i class="ri-home-4-line"></i>Home</a></li>
                    <li class="nav"><a href="#shots">Shots</a></li>
                    <li class="nav"><a href="#music"><i class="ri-music-line"></i>Music</a></li>
                    <li class="nav"><a href="#posts"><i class="ri-file-text-line"></i>Posts</a></li>
                    <li class="nav"><a href="#subscriptions"><i class="ri-group-line"></i>Subscriptions</a></li>
                    <li class="nav"><a href="#watch-later"><i class="ri-time-line"></i></i>Watch Later</a></li>
                    <li class="nav"><a href="#playlists"><i class="ri-play-list-2-line"></i>Playlists</a></li>
                    <li class="nav"><a href="#history"><i class="ri-history-line"></i>History</a></li>
                </ul>
            </section>

        </div>

    </div>

    <!-- for only mobile type devices, we have a bottom navBar -->

    <footer class="bottom-navBar">

        <div>
            <div class="nav-links">
                <!-- Navigation links for bottom navbar -->
                <section>
                    <ul class="navs">
                        <li class="nav"><a href="#home">Home</a></li>
                        <li class="nav"><a href="#shots">Shots</a></li>
                        <li class="nav"><a href="#create" id="creationBtn"><i class="ri-add-large-fill"></i></a></li>
                        <li class="nav"><a href="#music">Music</a></li>
                        <li class="nav"><a href="#posts">Posts</a></li>
                    </ul>
                </section>
            </div>
        </div>

    </footer>

    <!-- JS (use defer to ensure DOM is loaded) -->
    <script src="script.js" defer></script>

</body>

</html>
