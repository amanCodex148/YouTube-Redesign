<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- disable zooming on mobile (pinch zoom + double tap) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Youtube Redesign - AmanCodex , Pratham</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Sora:wght@100..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/homepage.css">

     <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet"/>

</head>

<body onload="window.scrollTo(0,0)">

    <!-- started creating navbar here - pratham -->

    <div class="navBar">

        <!-- at the top of the page, we have a navbar which is divided into three sections - left, center and right. -->

        <!-- at the left, we have the logo of youtube -->

        <div class="navLeft">

            <img src="/assets/images/YouTube-Logo.png" alt="logo-img" id="logo-img"> <!-- change the logo if you want, i just added it for checking responsiveness -->

        <!-- <h2 id="logo-text">YouTube</h2> --> <!-- disabled it temporarily -->

        </div>

        <!-- at the center, we have the search bar and the category dropdown -->

        <div class="navCenter">

            <select class="category">

                <option value="all"> All </option>
                <option value="movie"> Movies </option>
                <option value="music"> Music </option>
                <option value="gaming"> Gaming </option>

            </select>
        

            <input type="text" name="searchBar" id="searchBar" placeholder="Search...">

            <!-- Replace emoji with actual logo later -->

            <button id="searchBtn">🔍</button>  <!-- Search icon button -->
            
            <button id="micBtn">🎙️</button> <!-- add mic logo later -->

        </div>

        <!-- at the right, we have the profile picture and the dropdown for profile options -->

        <div class="navRight">

            <img src="profilephotohere" class="profile" id="profile-img">

            <select class="profile-options">

                <option value="user-profile"> My Profile </option>
                <option value="settings"> Settings </option>

                <!-- added from here, before doing anything, once run the "git pull origin main" -->

                <option value="sign-out"> Sign Out </option>
                <option value="appearance"> Appearance </option>  <!-- for dark mode and light mode toggle -->

            </select>

    </div>

    <script src="/script.js"></script>
    
</body>

</html>
