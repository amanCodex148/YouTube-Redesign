<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube Redesign - Toxic Aman, Pratham</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="homepage.css">

<body>
    <!-- started creating navbar here - pratham -->
    <div class="navbar">
        <div class="nav-left">
            <img src="ourlogohere.png" alt="logo-img">
            <h2 class="logo-text">YouTube</h2>
        </div>

        <div class="nav-center">
            <select class="category">
                <option>All</option>
                <option>Movies</option>
                <option>Music</option>
                <option>Gaming</option>
            </select>
        

            <input type="text" id="searchInput" placeholder="Search...">
            <!-- add mic logo later -->
            <button>Mic</button>

        </div>

        <div class="nav-right">
            <img src="profilephotohere" class="profile">
            <select class="profile-options">
                <option>My Profile</option>
                <option>Settings</option>
                <!-- add more later only if needed or remove -  sleepy right now good night! -->
            </select>
        </div>
        

    </nav>
